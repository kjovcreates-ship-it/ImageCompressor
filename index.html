<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Photo Compressor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="icon.png">
</head>
<body>

  <header>
    <h1>Photongina<sub> by kjov</sub> </h1>
    <img src ="icon.png" alt="App Logo" class="app-icon" />
    <span class="badge">Free</span>
    <button id="themeBtn">
      <span id="themeIcon">☀️</span>
      <span id="themeLabel">Light</span>
    </button>
  </header>

  <div class="card">

    <!-- Tap / Drop zone -->
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="dz-icon">📷</div>
      <p class="dz-title">Tap to choose photo/s</p>
      <p class="dz-sub">
        <span class="dz-mobile">Pick from your gallery or camera &middot; multiple OK</span>
        <span class="dz-desktop">Drop images here or click to browse &middot; select multiple</span>
      </p>
      <p class="dz-sub" style="margin-top:4px;">JPG &middot; PNG &middot; WebP</p>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none" />
    </div>

    <!-- Controls -->
    <hr class="divider" />
    <div class="controls-row">
      <div class="quality-block">
        <div class="ctrl-label">Quality</div>
        <div class="slider-row">
          <input type="range" id="qualitySlider" min="1" max="100" value="70" step="1" />
          <div class="quality-wrap">
            <input type="number" id="qualityInput" min="1" max="100" value="79" inputmode="numeric" />
            <span class="pct">%</span>
          </div>
        </div>
      </div>
      <div class="format-block">
        <div class="ctrl-label">Output Format</div>
        <div class="fmt-group">
          <button class="fmt-btn active" data-fmt="image/jpeg" data-ext="jpg">JPG</button>
          <button class="fmt-btn" data-fmt="image/png" data-ext="png">PNG</button>
          <button class="fmt-btn" data-fmt="image/webp" data-ext="webp">WebP <span class="webp-tag">SMALLER</span></button>
        </div>
      </div>
    </div>

    <!-- Work area -->
    <div id="workArea">
      <hr class="divider" />

      <div class="summary-bar">
        <div class="count-label"><strong id="imgCount">0</strong> images</div>
        <div class="summary-stats">
          <div class="s-stat">Before: <span id="totalOrig">—</span></div>
          <div class="s-stat">After: <span id="totalComp">—</span></div>
          <div class="s-stat">Saved: <span id="totalSaved">—</span></div>
        </div>
      </div>

      <div class="img-grid" id="imgGrid">
        <div class="add-more-card" id="addMoreBtn" onclick="document.getElementById('fileInput').click()">
          <span class="plus">+</span>
          <span>Add more</span>
        </div>
      </div>

      <div class="action-row">
        <button class="btn-primary" id="dlAllBtn" disabled>&#8659; Download All</button>
        <button class="btn-secondary" id="clearBtn">&#x2715; Clear All</button>
      </div>
    </div>

  </div>

  <canvas id="canvas" style="display:none"></canvas>

  <script src="script.js"></script>

</body>

<footer class="footer">
  <p  style="text-align:center; font-size:14px; margin-top:20px;">
    &copy; 2026 kjov. All rights reserved. &middot;
    <a class="linkfooter" href="https://kjov.free.nf/" target="_blank" style="color:#91f242; text-decoration:underline;">Visit my site</a>
  </p>
</footer>
</html>
